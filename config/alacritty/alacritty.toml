# Alacritty Configuration with One Dark theme and live reload

[general]
# Automatically reload the configuration file when it changes
live_config_reload = true
import = [
"alacritty-theme/themes/one_dark.toml",
]

[window]
padding = { x = 8, y = 8 }
decorations = "full"
opacity = 0.95
dynamic_title = true

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
size = 12.0

[cursor]
style = { shape = "Beam", blinking = "On" }
unfocused_hollow = true

[scrolling]
history = 10000
multiplier = 3

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[window.dimensions]
columns = 86
lines = 30
